<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — To-Do App</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F0E8;
      --surface: #FDFAF4;
      --accent: #2D4A3E;
      --accent-light: #4A7C6F;
      --accent-pale: #D6E8E3;
      --text: #1C2B26;
      --text-muted: #6B8A80;
      --border: #DDD8CC;
      --danger: #C0392B;
      --done-text: #A0B8B2;
      --shadow: 0 2px 16px rgba(45,74,62,0.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(74,124,111,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(45,74,62,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* Header */
    .header {
      margin-bottom: 40px;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 38px;
      color: var(--accent);
      letter-spacing: -1px;
      line-height: 1;
    }

    .date-badge {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--accent-pale);
      padding: 6px 14px;
      border-radius: 99px;
      font-weight: 500;
      margin-top: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
    }

    .stat-num {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 4px;
      font-weight: 500;
    }

    /* Progress bar */
    .progress-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 5px;
      margin-bottom: 28px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* Input area */
    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .task-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .task-input::placeholder { color: var(--text-muted); }
    .task-input:focus { border-color: var(--accent-light); }

    .priority-select {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    .add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .add-btn:hover { background: var(--accent-light); }
    .add-btn:active { transform: scale(0.97); }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      padding: 6px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .filter-btn:hover:not(.active) {
      border-color: var(--accent-light);
      color: var(--accent);
    }

    /* Task list */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted);
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state p { font-size: 15px; }

    /* Task item */
    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideIn 0.25s ease;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .task-item:hover {
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }

    .task-item.done {
      opacity: 0.6;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Priority stripe */
    .task-item.high  { border-left: 4px solid #E74C3C; }
    .task-item.medium { border-left: 4px solid #F39C12; }
    .task-item.low   { border-left: 4px solid #27AE60; }

    /* Checkbox */
    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 12px;
      color: transparent;
    }

    .task-item.done .check-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .check-btn:hover { border-color: var(--accent); }

    .task-text {
      flex: 1;
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.4;
      transition: color 0.2s;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--done-text);
    }

    .priority-tag {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 3px 10px;
      border-radius: 99px;
      flex-shrink: 0;
    }

    .priority-tag.high   { background: #FDECEA; color: #C0392B; }
    .priority-tag.medium { background: #FEF9E7; color: #D68910; }
    .priority-tag.low    { background: #EAFAF1; color: #1E8449; }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 18px;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: var(--danger); background: #FDECEA; }

    /* Clear completed */
    .footer-actions {
      margin-top: 24px;
      display: flex;
      justify-content: flex-end;
    }

    .clear-btn {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: underline;
      transition: color 0.2s;
    }

    .clear-btn:hover { color: var(--danger); }

    @media (max-width: 480px) {
      .logo { font-size: 28px; }
      .input-area { flex-wrap: wrap; }
      .task-input { width: 100%; }
      .add-btn { width: 100%; }
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-top">
      <h1 class="logo">TaskFlow</h1>
      <span class="date-badge" id="dateBadge"></span>
    </div>
    <p class="subtitle">Stay organised, one task at a time.</p>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="totalCount">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="pendingCount">0</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="doneCount">0</div>
      <div class="stat-label">Completed</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <div class="input-area">
    <input class="task-input" id="taskInput" type="text" placeholder="Add a new task..." maxlength="120"/>
    <select class="priority-select" id="prioritySelect">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <button class="add-btn" onclick="addTask()">+ Add</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
    <button class="filter-btn" onclick="setFilter('high', this)">High Priority</button>
  </div>

  <div class="task-list" id="taskList"></div>

  <div class="footer-actions">
    <button class="clear-btn" onclick="clearCompleted()">Clear completed</button>
  </div>

</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('taskflow_tasks') || '[]');
  let currentFilter = 'all';

  // Set date
  document.getElementById('dateBadge').textContent =
    new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });

  function saveTasks() {
    localStorage.setItem('taskflow_tasks', JSON.stringify(tasks));
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const priority = document.getElementById('prioritySelect').value;
    const text = input.value.trim();
    if (!text) { input.focus(); return; }

    tasks.unshift({ id: Date.now(), text, priority, done: false });
    saveTasks();
    input.value = '';
    input.focus();
    render();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; saveTasks(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    render();
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.done);
    saveTasks();
    render();
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function getFiltered() {
    if (currentFilter === 'all') return tasks;
    if (currentFilter === 'pending') return tasks.filter(t => !t.done);
    if (currentFilter === 'completed') return tasks.filter(t => t.done);
    if (currentFilter === 'high') return tasks.filter(t => t.priority === 'high');
    return tasks;
  }

  function render() {
    const list = document.getElementById('taskList');
    const filtered = getFiltered();

    // Stats
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const pending = total - done;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('doneCount').textContent = done;
    document.getElementById('pendingCount').textContent = pending;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    document.getElementById('progressBar').style.width = pct + '%';

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">✓</div>
          <p>${currentFilter === 'completed' ? 'No completed tasks yet.' : 'No tasks here. Add one above!'}</p>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task-item ${t.priority} ${t.done ? 'done' : ''}">
        <button class="check-btn" onclick="toggleTask(${t.id})">✓</button>
        <span class="task-text">${escapeHtml(t.text)}</span>
        <span class="priority-tag ${t.priority}">${t.priority}</span>
        <button class="delete-btn" onclick="deleteTask(${t.id})" title="Delete">×</button>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
